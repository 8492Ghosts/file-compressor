<script>
document.addEventListener('DOMContentLoaded', () => {

  let files = [];
  let idCounter = 0;
  let ffmpegReady = false;
  let ffmpegInstance = null;

  // ---------- DOM ----------
  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const browseBtn = document.getElementById('browseBtn');

  const qualitySlider = document.getElementById('qualitySlider');
  const qualityVal = document.getElementById('qualityVal');

  const crfSlider = document.getElementById('crfSlider');
  const crfVal = document.getElementById('crfVal');

  const formatSelect = document.getElementById('formatSelect');
  const resizeSelect = document.getElementById('resizeSelect');
  const presetSelect = document.getElementById('presetSelect');
  const videoScaleSelect = document.getElementById('videoScaleSelect');
  const audioBitrateSelect = document.getElementById('audioBitrateSelect');

  const fileListEl = document.getElementById('fileList');
  const emptyHint = document.getElementById('emptyHint');
  const actionRow = document.getElementById('actionRow');
  const processBtn = document.getElementById('processBtn');
  const downloadAllBtn = document.getElementById('downloadAllBtn');

  const summaryBar = document.getElementById('summaryBar');
  const sumOriginal = document.getElementById('sumOriginal');
  const sumCompressed = document.getElementById('sumCompressed');
  const sumSaved = document.getElementById('sumSaved');
  const sumPct = document.getElementById('sumPct');

  const ffmpegBanner = document.getElementById('ffmpegBanner');
  const ffmpegStatus = document.getElementById('ffmpegStatus');

  // ---------- SAFETY: never crash page ----------
  function safe(el, fn) {
    if (el && fn) fn(el);
  }

  // ---------- FFmpeg LOAD ----------
  async function loadFFmpeg() {
    try {
      const lib = window.FFmpegWASM;

      if (!lib) {
        throw new Error("FFmpeg library not found");
      }

      const { FFmpeg } = lib;

      ffmpegInstance = new FFmpeg();

      ffmpegInstance.on('log', () => { /* optional */ });

      await ffmpegInstance.load({
        coreURL: 'https://cdnjs.cloudflare.com/ajax/libs/ffmpeg/0.12.10/ffmpeg-core.js',
        wasmURL: 'https://cdnjs.cloudflare.com/ajax/libs/ffmpeg/0.12.10/ffmpeg-core.wasm',
      });

      ffmpegReady = true;

      safe(ffmpegBanner, el => el.className = 'ffmpeg-banner ready');
      safe(ffmpegStatus, el => el.textContent = 'FFmpeg ready — video enabled');
      safe(processBtn, el => el.disabled = false);

    } catch (err) {
      console.error(err);

      ffmpegReady = false;

      safe(ffmpegBanner, el => el.className = 'ffmpeg-banner error');
      safe(ffmpegStatus, el => el.textContent = 'FFmpeg failed — images only mode');

      safe(processBtn, el => el.disabled = false);
    }
  }

  loadFFmpeg();

  // ---------- HELPERS ----------
  const isVideo = t => t?.startsWith('video/');

  const fmt = b => {
    if (!b) return '0 B';
    const k = 1024;
    const i = Math.floor(Math.log(b) / Math.log(k));
    return (b / Math.pow(k, i)).toFixed(1) + ['B','KB','MB','GB'][i];
  };

  // ---------- IMAGE ----------
  async function compressImage(file, entry) {
    return new Promise(resolve => {
      const r = new FileReader();

      r.onload = e => {
        const img = new Image();

        img.onload = () => {
          const q = qualitySlider.value / 100;
          const max = +resizeSelect.value;

          let w = img.width, h = img.height;

          if (max && (w > max || h > max)) {
            if (w > h) {
              h = Math.round(h * max / w);
              w = max;
            } else {
              w = Math.round(w * max / h);
              h = max;
            }
          }

          const c = document.createElement('canvas');
          c.width = w;
          c.height = h;

          c.getContext('2d').drawImage(img, 0, 0, w, h);

          c.toBlob(blob => resolve(blob), 'image/jpeg', q);
        };

        img.src = e.target.result;
      };

      r.readAsDataURL(file);
    });
  }

  // ---------- VIDEO ----------
  async function compressVideo(file, entry) {
    const ff = ffmpegInstance;

    const input = `in_${entry.id}.mp4`;
    const output = `out_${entry.id}.mp4`;

    const data = await FFmpegWASM.fetchFile(file);
    await ff.writeFile(input, data);

    const args = [
      '-i', input,
      '-c:v', 'libx264',
      '-crf', crfSlider.value,
      '-preset', presetSelect.value
    ];

    const scale = +videoScaleSelect.value;
    if (scale > 0) {
      args.push('-vf', `scale=${scale}:-2`);
    }

    const audio = audioBitrateSelect.value;
    if (audio === '0') {
      args.push('-an');
    } else {
      args.push('-c:a', 'aac', '-b:a', audio);
    }

    args.push('-y', output);

    await ff.exec(args);

    const out = await ff.readFile(output);

    return new Blob([out.buffer], { type: 'video/mp4' });
  }

  // ---------- FILE HANDLING ----------
  function addFiles(list) {
    for (const f of list) {
      const entry = {
        id: idCounter++,
        file: f,
        originalSize: f.size,
        compressedBlob: null,
        compressedSize: null,
        status: 'idle'
      };

      files.push(entry);

      const el = document.createElement('div');
      el.className = 'file-item';
      el.innerHTML = `
        <div class="file-icon">${isVideo(f.type) ? '🎞' : '🖼'}</div>
        <div class="file-info">
          <div class="file-name">${f.name}</div>
          <div class="file-meta">${fmt(f.size)}</div>
        </div>
        <div id="fs-${entry.id}" class="size-badge">${fmt(f.size)}</div>
      `;

      fileListEl.appendChild(el);
    }

    safe(emptyHint, el => el.style.display = 'none');
    safe(actionRow, el => el.style.display = 'flex');
  }

  // ---------- PROCESS ----------
  processBtn.addEventListener('click', async () => {
    processBtn.disabled = true;

    for (const f of files) {
      try {
        let blob;

        if (isVideo(f.file.type)) {
          if (!ffmpegReady) throw new Error("FFmpeg not ready");
          blob = await compressVideo(f.file, f);
        } else {
          blob = await compressImage(f.file, f);
        }

        f.compressedBlob = blob;
        f.compressedSize = blob.size;
        f.status = 'done';

      } catch (e) {
        console.error(e);
        f.status = 'error';
      }

      const el = document.getElementById('fs-' + f.id);
      if (el && f.compressedSize) {
        el.textContent = fmt(f.compressedSize);
      }
    }

    processBtn.disabled = false;
  });

  // ---------- EVENTS ----------
  dropzone.addEventListener('drop', e => {
    e.preventDefault();
    addFiles(e.dataTransfer.files);
  });

  browseBtn.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', () => addFiles(fileInput.files));

});
</script>
