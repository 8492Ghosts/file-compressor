<script>
(async () => {
  let files = [];
  let idCounter = 0;
  let ffmpegReady = false;
  let ffmpegInstance = null;

  const dropzone         = document.getElementById('dropzone');
  const fileInput        = document.getElementById('fileInput');
  const browseBtn        = document.getElementById('browseBtn');
  const qualitySlider    = document.getElementById('qualitySlider');
  const qualityVal       = document.getElementById('qualityVal');
  const crfSlider        = document.getElementById('crfSlider');
  const crfVal           = document.getElementById('crfVal');
  const formatSelect     = document.getElementById('formatSelect');
  const resizeSelect     = document.getElementById('resizeSelect');
  const presetSelect     = document.getElementById('presetSelect');
  const videoScaleSelect = document.getElementById('videoScaleSelect');
  const audioBitrateSelect = document.getElementById('audioBitrateSelect');
  const fileListEl       = document.getElementById('fileList');
  const emptyHint        = document.getElementById('emptyHint');
  const actionRow        = document.getElementById('actionRow');
  const processBtn       = document.getElementById('processBtn');
  const downloadAllBtn   = document.getElementById('downloadAllBtn');
  const summaryBar       = document.getElementById('summaryBar');
  const sumOriginal      = document.getElementById('sumOriginal');
  const sumCompressed    = document.getElementById('sumCompressed');
  const sumSaved         = document.getElementById('sumSaved');
  const sumPct           = document.getElementById('sumPct');
  const ffmpegBanner     = document.getElementById('ffmpegBanner');
  const ffmpegStatus     = document.getElementById('ffmpegStatus');

  function fmtBytes(bytes) {
    if (!bytes) return '0 B';
    const k = 1024, sizes = ['B','KB','MB','GB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return (bytes / Math.pow(k, i)).toFixed(1) + ' ' + sizes[i];
  }

  function fileIcon(type) {
    if (type.startsWith('image/')) return '🖼';
    if (type.startsWith('video/')) return '🎞';
    return '📁';
  }

  function isVideo(type) {
    return type.startsWith('video/');
  }

  function setProgress(id, pct, label) {
    const fs = document.getElementById('fs-' + id);
    if (!fs) return;
    fs.innerHTML = `
      <div class="progress-wrap">
        <div class="progress-label">${label}</div>
        <div class="progress-bar-wrap">
          <div class="progress-bar-fill" style="width:${pct}%"></div>
        </div>
      </div>`;
  }

  // ---------------- FFmpeg INIT ----------------
  async function loadFFmpeg() {
    try {
      const { FFmpeg } = window.FFmpegWASM;

      ffmpegInstance = new FFmpeg();

      // SINGLE global log handler (IMPORTANT FIX)
      ffmpegInstance.on('log', ({ message }) => {
        const dur = message.match(/Duration:\s*(\d+):(\d+):([\d.]+)/);
        const time = message.match(/time=\s*(\d+):(\d+):([\d.]+)/);

        if (dur && ffmpegInstance._durationSetter) {
          const total =
            +dur[1] * 3600 +
            +dur[2] * 60 +
            +dur[3];

          ffmpegInstance._durationSetter(total);
        }

        if (time && ffmpegInstance._progressHandler) {
          const elapsed =
            +time[1] * 3600 +
            +time[2] * 60 +
            +time[3];

          ffmpegInstance._progressHandler(elapsed);
        }
      });

      await ffmpegInstance.load({
        coreURL: 'https://cdnjs.cloudflare.com/ajax/libs/ffmpeg/0.12.10/ffmpeg-core.js',
        wasmURL: 'https://cdnjs.cloudflare.com/ajax/libs/ffmpeg/0.12.10/ffmpeg-core.wasm',
      });

      ffmpegReady = true;
      ffmpegBanner.className = 'ffmpeg-banner ready';
      ffmpegStatus.textContent = 'FFmpeg ready — video compression enabled';
      processBtn.disabled = false;

    } catch (err) {
      console.error(err);
      ffmpegBanner.className = 'ffmpeg-banner error';
      ffmpegStatus.textContent = 'FFmpeg failed — image-only mode';
      processBtn.disabled = false;
    }
  }

  loadFFmpeg();

  // ---------------- IMAGE ----------------
  async function compressImage(entry) {
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          const quality = qualitySlider.value / 100;
          const maxDim = +resizeSelect.value;

          let w = img.width, h = img.height;

          if (maxDim && (w > maxDim || h > maxDim)) {
            if (w > h) {
              h = Math.round(h * maxDim / w);
              w = maxDim;
            } else {
              w = Math.round(w * maxDim / h);
              h = maxDim;
            }
          }

          const canvas = document.createElement('canvas');
          canvas.width = w;
          canvas.height = h;

          canvas.getContext('2d').drawImage(img, 0, 0, w, h);

          const mime =
            formatSelect.value === 'original'
              ? entry.file.type
              : formatSelect.value;

          canvas.toBlob(resolve, mime || 'image/jpeg', quality);
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(entry.file);
    });
  }

  // ---------------- VIDEO (FIXED) ----------------
  async function compressVideo(entry) {
    const ff = ffmpegInstance;

    const input = `in_${entry.id}` + (entry.file.name.match(/\.[^.]+$/)?.[0] || '.mp4');
    const output = `out_${entry.id}.mp4`;

    setProgress(entry.id, 5, 'Loading…');

    const data = await FFmpegWASM.fetchFile(entry.file);
    await ff.writeFile(input, data);

    const crf = crfSlider.value;
    const preset = presetSelect.value;
    const scale = +videoScaleSelect.value;
    const audio = audioBitrateSelect.value;

    const args = ['-i', input];

    args.push('-c:v', 'libx264', '-crf', crf, '-preset', preset);

    // FIXED SCALE FILTER (no broken quotes/min())
    if (scale > 0) {
      args.push('-vf', `scale=${scale}:-2`);
    }

    if (audio === '0') {
      args.push('-an');
    } else {
      args.push('-c:a', 'aac', '-b:a', audio);
    }

    args.push('-movflags', '+faststart', '-y', output);

    let duration = 0;

    ff._durationSetter = (d) => duration = d;

    ff._progressHandler = (elapsed) => {
      if (!duration) return;
      const pct = Math.min(95, 10 + (elapsed / duration) * 85);
      setProgress(entry.id, pct, `Encoding ${Math.round(elapsed)}s`);
    };

    setProgress(entry.id, 20, 'Transcoding…');
    await ff.exec(args);

    setProgress(entry.id, 95, 'Finalizing…');

    const out = await ff.readFile(output);
    const blob = new Blob([out.buffer], { type: 'video/mp4' });

    try { await ff.deleteFile(input); } catch {}
    try { await ff.deleteFile(output); } catch {}

    return blob;
  }

  // ---------------- PROCESS ----------------
  processBtn.addEventListener('click', async () => {
    processBtn.disabled = true;

    for (const f of files) {
      try {
        let blob;

        if (isVideo(f.file.type)) {
          if (!ffmpegReady) throw new Error('FFmpeg not ready');
          blob = await compressVideo(f);
        } else {
          blob = await compressImage(f);
        }

        f.compressedBlob = blob;
        f.compressedSize = blob.size;
        f.status = blob.size < f.originalSize ? 'done' : 'skipped';

      } catch (e) {
        console.error(e);
        f.status = 'error';
      }

      const el = document.getElementById('fs-' + f.id);
      if (el) el.textContent = f.status;

      await new Promise(r => setTimeout(r, 30));
    }

    processBtn.disabled = false;
  });

})();
</script>
